- type: constructionGraph
  id: floordrain
  start: start
  graph:
    - node: start
      actions:
        - !type:DestroyEntity {}
      edges:
        - to: finish
          completed:
            - !type:SnapToGrid { }
          steps:
            - material: Steel
              amount: 3
            - material: MetalRod
              amount: 4
              doAfter: 3
    - node: finish
      entity: FloorDrain
      edges:
        - to: start
          completed:
            - !type:SpawnPrototype
              prototype: SheetSteel1
              amount: 3
            - !type:SpawnPrototype
              prototype: PartRodMetal
              amount: 4
          steps:
            - tool: Screwing
              doAfter: 3

