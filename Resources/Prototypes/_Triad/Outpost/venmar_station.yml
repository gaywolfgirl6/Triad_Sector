- type: gameMap
  id: Venmar
  mapName: 'Venmar Station'
  mapPath: /Maps/_Triad/Outpost/venmar_station.yml # Triad
  minPlayers: 0
  maxPlayers: 100
  randomRotation: false
  maxRandomOffset: 0
  stations:
    Venmar:
      stationProto: StandardFrontierStation # Using this temporarily
      gridComponents:
      - type: VesselMusic
        ambientMusicPrototype: ColossusCentralMusic
      - type: VesselInfo
        description: "In the midst of all the hardships, this station is our refuge, our spark of hope."
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Venmar Station'
#          nameGenerator:
#            !type:NanotrasenNameGenerator
#            prefixCreator: '14'
        - type: ExtraStationInformation
          icon: /Textures/_Triad/Logo/tfa_icon/icon-64x64.png # used the biggest one, looks better when downscaling than upscaling
          stationSubtext: 'triad-lobby-triad-subtext'
          stationDescription: 'triad-lobby-triad-description'
          lobbySortOrder: 1
        # - type: StationPlanetSpawner # Mono - Commented out planet spawner (for now)
        #   planet: DesertWorld
        #   gridPath: /Maps/_Triad/POI/surface_outpost_desert.yml
        - type: StationJobs
          availableJobs:
            Contractor: [ -1, -1 ]
            Pilot: [ -1, -1 ]
            Mercenary: [ -1, -1 ]
            Borg: [ -1, -1 ]
            StationRepresentative: [ 1, 1 ]
            StationTrafficController: [ 2, 2 ]
            SecurityGuard: [ 3, 3 ]
            CCServiceWorker: [ 2, 2 ]
            NFJanitor: [ 2, 2 ]
            MailCarrier: [ 2, 2 ]
            TdfPatrolTeamLeader: [ 1, 1 ]
            TdfMedic: [ 1, 1 ]
            TdfEnforcer: [ 2, 2 ]
            TdfCadet: [ 2, 2 ]
          tags:
          - HeadOfPersonnel
          - HeadOfSecurity
