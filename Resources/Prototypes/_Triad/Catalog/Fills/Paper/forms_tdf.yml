- type: entity # Creator: Aqualious (discord)
  id: PaperWrittenTdfContrabandPermit
  name: contraband permit
  parent: Paper
  categories: [ HideSpawnMenu ]
  components:
  - type: Paper
    content: |2
      [color=#725B24]🛡[bold]TDF[/bold]🛡 [bold]Triad Defense Force[/bold][/color]
      [bold]Contraband Permit[/bold]
      [color=#725B24]‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾[/color]

      [bold]This Document is a sworn declaration of contraband permitted to be used and carried on a Triad citizen, henceforth known as the Carrier.[/bold]

      [italic]The Carrier of this permit is safe from any legal action while carrying this permit, so long as they are acting in a reasonable way in accordance with the law and public decency. While the TDF may not arrest the holder of this permit for possession, they may still ask that storable gear be moved out of sight if they believe a code violation may occur.[/italic]

      [color=red]Only Class 2 and below Contraband permits may be issued. Class 3 Contraband is not permitted to be carried by any citizen, regardless of permit.[/color]

      [color=#725B24]‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾[/color]
