- type: entity # Creator: Aqualious (discord)
  id: PaperWrittenTdfShipSearchWarrant
  name: ship search warrant
  parent: Paper
  categories: [ HideSpawnMenu ]
  components:
  - type: Paper
    content: |2
      [color=#725B24]🛡[bold]TDF[/bold]🛡 [bold]Triad Defense Force[/bold][/color]
      [bold]Ship Search Warrant[/bold]
      [color=#725B24]‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾[/color]

      [italic] This warrant - legally authorized by powers at hand - grants the TDF the lawful right to exhort their authority and conduct a lawful ship search.[/italic]

      [color=red][bold]This warrant must be signed and stamped by the Warden or Chief Enforcer. If requested by one, another must be the one to approve the warrant.[/bold][/color]

      [bold]Requesting Enforcer: [/bold][color=#AD8B37][signature][/color]
      [bold]Warrant Target: [/bold][color=#AD8B37][form][/color]
      [bold]Warrant Reason: [/bold][color=#AD8B37][form][/color]

      [italic]If illegal items are found in the searched department, they will be confiscated, and the owner of these items may be detained at the officer's discretion. [bold]Legal items may not be taken in a search.[/bold][/italic]

      [bold]Warden or Chief Enforcer Signature: [/bold][signature]

      [color=#aaaaaa]This document is not valid unless stamped by at least one of the listed required personnel. This Warrant is not required on Red Alert; however, given the scope, justifications to High Command should be reported before the search is conducted.[/color]
      [color=#725B24]‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾ Stamps ‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾‾[/color]
