# These forms should be kept up-to-date with changes to Sector Law and SOP.

# Filled Folder
- type: entity
  id: FillTdfForms
  abstract: true
  components:
  - type: StorageFill
    contents:
    - id: PaperWrittenTdfAfterActionReport
    - id: PaperWrittenTdfDnr
    - id: PaperWrittenTdfInvestigatorReport
    - id: PaperWrittenTdfShipSearchWarrant
    - id: PaperWrittenTdfContrabandPermit
    - id: Paper
      prob: 0.5
    - id: Paper
      prob: 0.5

- type: entity
  parent: [FillTdfForms, BoxFolderTdf]
  id: BoxFolderTdfForms
  name: TDF form folder
  description: A folder filled with TDF paperwork templates.
  suffix: Forms, Normal

- type: entity
  parent: [FillTdfForms, BoxFolderTdfInvert]
  id: BoxFolderTdfFormsInvert
  name: TDF form folder
  description: A folder filled with TDF paperwork templates.
  suffix: Forms, Invert

# Forms
