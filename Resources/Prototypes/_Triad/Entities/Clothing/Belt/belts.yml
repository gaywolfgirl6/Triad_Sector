- type: entity
  parent: NFClothingBeltStorageBase
  id: MLA79Harness
  name: MLA-79 Harness
  description: A powered harness designed to be utilized with the MLA-79 Smartgun, provides assistance in movement, aiming, and firing.
  components:
    - type: Sprite
      sprite: _Triad/Clothing/Belt/mla79harness.rsi
    - type: Clothing
      sprite: _Triad/Clothing/Belt/mla79harness.rsi
    - type: Item
      size: Large
      shape:
        - 0,0,3,1
    - type: WeaponCaseInsertable
    - type: PowerCellSlot
      cellSlotId: cell_slot
    - type: ContainerContainer
      containers:
        storagebase: !type:Container
        cell_slot: !type:ContainerSlot
    - type: ItemSlots
      slots:
        cell_slot:
          name: power-cell-slot-component-slot-name-default
          startingItem: PowerCellMedium
          blacklist:
            tags:
              - PowerCellAntique
    - type: PowerCellDraw
      useRate: 5
      drawRate: 0
    - type: Storage
      grid:
        - 0,0,5,1
    - type: WeapHarn
      supportKey: Mla79Smartgun
      lowPowerAlert: Mla79HarnessLowPower
      depletedAlert: Mla79HarnessDepleted
      linkSound:
        path: /Audio/Machines/chime.ogg
        params:
          volume: -4.5
      halfChargeSound:
        path: /Audio/Machines/twobeep.ogg
        params:
          volume: -4.5
      depletedSound:
        path: /Audio/Machines/Nuke/angry_beep.ogg
        params:
          volume: -4.5
      linkPopup: ""
      magneticRetrievalEnabledPopup: MLA-79 magnetic retrieval enabled.
      magneticRetrievalDisabledPopup: MLA-79 magnetic retrieval disabled.