- type: entity
  parent: [ClothingHeadHardsuitBase, ClothingHeadSuitWithLightBase]
  id: ClothingHeadHelmetHardsuitTdf
  name: TA-21 helmet
  description: The interchangeable helmet system for the majority of TA-21 hardsuits. Has a newly fitted night vision optic, compared to NanoTrasen's original N-20 design.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Triad/Clothing/Head/Hardsuits/tdf.rsi
  - type: Clothing
    sprite: _Triad/Clothing/Head/Hardsuits/tdf.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.08
    lowPressureMultiplier: 1000
  - type: NightVision
    flashDurationMultiplier: 3.5
    isEquipment: true
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.95
        Slash: 0.95
        Piercing: 0.95
        Heat: 0.95
  - type: ToggleableVisuals
    spriteLayer: light
    clothingVisuals:
      head:
      - state: equipped-head-light
  - type: PointLight
    color: "#F5EDE5"

- type: entity
  parent: ClothingHeadHelmetHardsuitTdf
  id: ClothingHeadHelmetHardsuitTdfMedic
  name: TA-21 medic helmet
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Triad/Clothing/Head/Hardsuits/tdf-medic.rsi
  - type: Clothing
    sprite: _Triad/Clothing/Head/Hardsuits/tdf-medic.rsi

- type: entity
  parent: [ClothingHeadHelmetHardsuitTdf, ShowMedicalIcons, ShowSecurityIcons]
  id: ClothingHeadHelmetHardsuitTdfChiefEnforcer
  name: TA-35 tacsuit helmet
  description: An armored tacsuit helmet used by the TDF. Comes with an advanced heads-up display allowing you to view security and medical records.
  categories: [ HideSpawnMenu ]
  components:
  - type: Sprite
    sprite: _Triad/Clothing/Head/Hardsuits/tdf-chief.rsi
  - type: Clothing
    sprite: _Triad/Clothing/Head/Hardsuits/tdf-chief.rsi
  - type: PressureProtection
    highPressureMultiplier: 0.3
    lowPressureMultiplier: 1000
  - type: EyeProtection
    protectionTime: 15
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.90
        Slash: 0.90
        Piercing: 0.95
        Heat: 0.90
        Radiation: 0.25
  - type: PointLight
    radius: 6
    color: "#FFFFB7"
