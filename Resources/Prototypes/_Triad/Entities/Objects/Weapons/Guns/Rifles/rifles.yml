- type: entity
  name: Misriah Autorifle (762x51mm)
  parent: [BaseWeaponRifle, BaseGunMeleeBlunt, BaseC3SyndicateContraband]
  id: WeaponRifleMMisriahAutorifle
  description: Standard issue assault rifle issued to marines and special forces; chambered in 762x51mm ammo. Produced by SESWC.
  components:
  - type: Sprite
    sprite: _Triad/Objects/Weapons/Guns/Rifles/ma5b.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Triad/Objects/Weapons/Guns/Rifles/ma5b.rsi
    quickEquip: false
    slots:
    - Back
    - suitStorage
  - type: Gun
    fireRate: 6
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/lmg.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/ltrifle_cock.ogg
  #- type: AltFireMelee - this is built into the Parent
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine762x51mmFMJ
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine762x51mmFMJ
            - Magazine762x51mmLowCapacityFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge762x51mmFMJ
        priority: 1
        whitelist:
          tags:
            - Cartridge762x51mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
 #- type: NFWeaponDetails  # when we get details in from frontier
 #  manufacturer: weapon-details-manufacturer-SESWC-consortium

- type: entity
  name: TDF M-7 Lecter (6.8x52mm Caseless)
  parent: WeaponRifleLecter
  id: WeaponRifleLecterTdf
  description: Reverse-engineered variant of the solarian republic's lecter, now used by the TDF as their standard issue rifle. Comes with a vertical grip to improve handling. Accurate, easy to use, and firing the 6.8x52mm STANAG round. Also accepts 5.56x45mm magazines to assist with standardization.
  components:
  - type: Item
    size: Huge
    sprite: _Triad/Objects/Weapons/Guns/Rifles/tdf_lecter_inhands_32x.rsi
  - type: Sprite
    sprite: _Triad/Objects/Weapons/Guns/Rifles/tdf_lecter.rsi
  - type: Clothing
    sprite: _Triad/Objects/Weapons/Guns/Rifles/tdf_lecter_inhands_32x.rsi
  - type: Gun
    cameraRecoilScalar: 0.5 # grip
    angleIncrease: 0.4

- type: entity
  parent: WeaponRifleLecterTdf
  id: WeaponRifleLecterTdfRubber
  suffix: Non-Lethal
  components:
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine68x52mmCaselessRubber
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/m16_magin.ogg
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/skm_magout.ogg
        priority: 2
        whitelist:
          tags:
            - Magazine68x52mmCaseless
            - Magazine556x45mmFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge68x52mmCaseless
        priority: 1
        whitelist:
          tags:
            - Cartridge68x52mmCaseless
            - Cartridge556x45mmFMJ

- type: entity
  name: TDF MR-8T DMR (8x65mm SKR)
  parent: [BaseFactionGearTDFT2, WeaponRifleMR8C]
  id: WeaponRifleMR8T
  description: An expensive TDF-modified version of the solarian republic's MR-8 DMR. It comes with a wooden grip, stock, a sleeker scope, and an improved barrel. Chambered in 8x65mm SKR. A label on the side reads "TRIAD DEFENSE FORCE".
  components:
  - type: Sprite
    sprite: _Triad/Objects/Weapons/Guns/Rifles/tdf_mr8c.rsi
  - type: Item
    sprite: _Triad/Objects/Weapons/Guns/Rifles/tdf_mr8c_inhands_32x.rsi
  - type: Clothing
    sprite: _Triad/Objects/Weapons/Guns/Rifles/tdf_mr8c_inhands_32x.rsi
  - type: Gun
    projectileSpeed: 65 # Improved barrel
  - type: SpeedModifiedOnWield
    walkModifier: 0.65
    sprintModifier: 0.5

- type: entity
  name: HZD "Pike" (5.56x45mm)
  parent: BaseWeaponRifle
  id: WeaponRiflePike
  description: Holk & Zis Dynamic's notoriously heavy burst rifle, featuring a scope and laser to assist in aiming.  A massively overbuilt rifle that was one of HZD's first offerings upon arriving in the sector, commonly seen in the hands of the hands of HZD guards who vigorously complain about its weight.
  components:
  - type: Item
    size: Huge
    sprite: _Triad/Objects/Weapons/Guns/Rifles/pike_inhands_32x.rsi
  - type: Sprite
    sprite: _Triad/Objects/Weapons/Guns/Rifles/pike.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: _Triad/Objects/Weapons/Guns/Rifles/pike_inhands_32x.rsi
  - type: GunRequiresWield
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/sf_rifle_cock.ogg
  - type: GunWieldBonus
    minAngle: -27
    maxAngle: -43
  - type: Gun
    minAngle: 30
    maxAngle: 48
    angleIncrease: 2
    angleDecay: 5
    cameraRecoilScalar: 0.1
    fireRate: 3
    selectedMode: Burst
    soundGunshot:
      path: /Audio/_RMC14/Effects/Weapons/Guns/Gunshots/gun_m54c_1.ogg
    availableModes:
    - Burst
    burstCooldown: 0.5
    burstFireRate: 15
    shotsPerBurst: 3
  - type: SpeedModifiedOnWield
    walkModifier: 0.80
    sprintModifier: 0.75
  - type: CursorOffsetRequiresWield
  - type: EyeCursorOffset
    maxOffset: 3.5
    pvsIncrease: 0.5
  - type: LaserPointer
    targetedColor: "#FF0000"
    defaultColor: "#FF0000"
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: Magazine556x45mmFMJ
        insertSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagIn/m16_magin.ogg
        ejectSound: /Audio/_Mono/Weapons/Guns/SmallArms/MagOut/skm_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine556x45mmFMJ
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge556x45mmFMJ
        priority: 1
        whitelist:
          tags:
          - Cartridge556x45mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 3500
