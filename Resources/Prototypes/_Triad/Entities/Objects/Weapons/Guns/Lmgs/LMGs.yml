- type: entity
  name: TDF MMG-38 "Riot" (6.8x52mm caseless)
  parent: [BaseWeaponLightMachineGun, BaseGunWieldable, BaseClass2AShipContraband]
  id: WeaponLMGRiot
  description: A reverse-engineered medium machine gun developed by the TDF from captured enemy technology. Designed to provide sustained suppressive fire, it is chambered in 6.8x52mm caseless and accepts both box and standard magazines. It is also compatible with 5.56x45mm and 7.62x39mm ammunition to simplify logistics. A label on the receiver reads "TRIAD DEFENSE FORCE."
  components:
  - type: Sprite
    sprite: _Mono/Objects/Weapons/Guns/LMGs/grizzly/Grizzly-icon.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: GunWieldBonus
    minAngle: 0
    maxAngle: 0
  - type: Gun
    minAngle: 2 # More firerate than L6 and Grizzly but having more recoil.
    maxAngle: 18
    angleIncrease: 1
    angleDecay: 9
    fireRate: 9
    selectedMode: FullAuto
    availableModes:
    - SemiAuto
    - FullAuto
    soundGunshot:
      path: /Audio/_Mono/Weapons/Guns/SmallArms/Gunshots/heavy_rifle_1.ogg
  - type: ChamberMagazineAmmoProvider
    soundRack:
      path: /Audio/Weapons/Guns/Cock/lmg_cock.ogg
    soundBoltClosed:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_closed.ogg
    soundBoltOpened:
      path: /Audio/Weapons/Guns/Bolt/lmg_bolt_open.ogg
  - type: Item
    sprite: _Mono/Objects/Weapons/Guns/LMGs/grizzly/Grizzly-inhands.rsi
    shape:
    - 0,0,7,4
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: AmmoBox68x52mmCaseless
        insertSound: /Audio/Weapons/Guns/MagIn/lmg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/lmg_magout.ogg
        priority: 2
        whitelist:
          tags:
          - Magazine68x52mmCaselessBoxSmall
          - Magazine68x52mmCaselessBoxBig
          - Magazine68x52mmCaseless
          - Magazine556x45mmFMJ
          - Magazine556x45mmBox
          - Magazine762x39mmFMJ
          - Magazine762x39mmLowCapacityFMJ
          - Magazine762x39mmBox
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: Cartridge68x52mmCaseless
        priority: 1
        whitelist:
          tags:
          - Cartridge68x52mmCaseless
          - Cartridge556x45mmFMJ
          - Cartridge762x39mmFMJ
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: _Mono/Objects/Weapons/Guns/LMGs/grizzly/Grizzly-inhands.rsi
    unequipDelay: 0.5
  - type: StaticPrice
    price: 2500
  - type: GunRequiresWield
  - type: PirateBountyItem
    id: ExperimentalFactionWeapon
  - type: HeldSpeedModifier
  - type: ClothingSpeedModifier
    sprintModifier: 0.95
    walkModifier: 0.95
  - type: SpeedModifiedOnWield
    walkModifier: 0.5
    sprintModifier: 0.4
  - type: WieldDelay
    baseDelay: 1.2
    modifiedDelay: 1.2
    preventFiring: true
  - type: SavingContraband
