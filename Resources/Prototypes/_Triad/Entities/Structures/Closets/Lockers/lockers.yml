- type: entity
  parent: ClosetBase
  id: TriadLockerBase
  abstract: true
  components:
  - type: Sprite
    sprite: _Triad/Structure/Storage/closet.rsi
    layers:
    - map: ["enum.StorageVisualLayers.Base"]
    - map: ["enum.StorageVisualLayers.Door"]
    - state: locked
      map: ["enum.LockVisualLayers.Lock"]
      shader: unshaded
    - state: welded
      sprite: Structures/Storage/closet.rsi
      visible: false
      map: ["enum.WeldableLayers.BaseWelded"]
    - state: paper
      visible: false
      sprite: Structures/Storage/closet_labels.rsi
      offset: "-0.065,0"
      map: ["enum.PaperLabelVisuals.Layer"]

- type: entity
  parent: TriadLockerBase
  id: TriadLockerBaseSecure
  abstract: true
  components:
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: StructuralMetallic
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 175
      behaviors:
      - !type:DoActsBehavior
        acts: ["Destruction"]

# TDF Enforcer
- type: entity
  parent: [TriadLockerBaseSecure, LockerSecurity]
  id: LockerTdf
  name: TDF locker
  suffix: Default
  components:
  - type: Sprite
    sprite: _Triad/Structure/Storage/closet.rsi
  - type: EntityStorageVisuals
    stateBaseClosed: tdf
    stateDoorOpen: tdf_open
    stateDoorClosed: tdf_door

# TDF - Evidence
- type: entity
