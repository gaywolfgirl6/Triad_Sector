- type: entity
  parent: [VendingMachine, BaseClass2AShipContrabandSilent] # Mono - removed BaseStructureDisableAnchoring
  id: VendingMachineTdfTech
  name: TDF-Tek
  description: A vending machine for TDF tech!
  components:
  - type: VendingMachine
    pack: TdfTechInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    requiresCash: true
  - type: Advertise
    pack: NfsdDrobeAds
  - type: SpeakOnUIClosed
    pack: SecTechGoodbyes
  - type: Sprite
    sprite: _Triad/Structure/Machines/VendingMachine/tdf.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: AccessReader
    access: [["Security"]]

- type: entity
  parent: [VendingMachine, BaseClass2AShipContrabandSilent] # Mono - removed BaseStructureDisableAnchoring
  id: VendingMachineTdfDrobe
  name: TDFDrobe
  description: A vending machine for TDF clothing!
  components:
  - type: VendingMachine
    pack: TdfDrobeInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    requiresCash: true
  - type: Advertise
    pack: NfsdDrobeAds
  - type: Sprite
    sprite: _Triad/Structure/Machines/VendingMachine/tdfdrobe.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: AccessReader
    access: [["Security"]]

- type: entity
  parent: NFVendingMachineCart
  id: VendingMachineCartTdf
  suffix: TDF
  components:
  - type: VendingMachine
    pack: PTechTdfInventory
  - type: AccessReader
    access: [["TdfChiefEnforcer"], ["TdfWarden"]]

- type: entity
  parent: [BaseStructureDisableAnchoring, VendingMachine]
  id: VendingMachineTdfHighCommandDrobe
  name: CommandDrobe
  description: TDF high command things!
  components:
  - type: VendingMachine
    pack: TdfCommandDrobeInventory
    offState: off
    brokenState: broken
    normalState: normal-unshaded
    requiresCash: true
  - type: Sprite
    sprite: _Triad/Structure/Machines/VendingMachine/highcommanddrobe.rsi
    layers:
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.Base"]
    - state: "off"
      map: ["enum.VendingMachineVisualLayers.BaseUnshaded"]
      shader: unshaded
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: PointLight
    radius: 1.5
    energy: 1.6
    color: "#407aa0"
  - type: AccessReader
    access: [["CentralCommand"]]
