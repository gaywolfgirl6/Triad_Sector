# Ballistic Turret
- type: entity
  id: SpawnRandomTurretRangeTDF
  name: random ranged ballistic turret spawn
  suffix: Triad, TDF
  parent: MarkerBase
  components:
    - type: Sprite
      layers:
        - state: red
        - sprite: Objects/Weapons/Guns/Turrets/turrets.rsi
          state: syndie_lethal
    - type: RandomSpawner
      prototypes:
        - WeaponTurretTDF
        - WeaponTurretTDFMediumRange
      chance: 1
      rarePrototypes:
        - WeaponTurretTDFLongRange
      rareChance: 0.3

