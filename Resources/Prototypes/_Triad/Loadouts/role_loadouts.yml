# No GroupTankHarness: NFSpeciesSpecific already forces LoadoutTankHarness (double vox harness otherwise).
- type: roleLoadout
  id: JobPlantManager
  groups:
  - ChiefEngineerHead
  - ChiefEngineerNeck
  - PlantManagerJumpsuit
  - PlantGloves
  - PlantManagerBackpack
  - ChiefEngineerOuterClothing
  - ChiefEngineerShoes
  - PlantFace
  - PlantGlasses
