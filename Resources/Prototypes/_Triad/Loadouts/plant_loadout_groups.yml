# Loadout groups for the Edison plant roles. The Contractor* groups carry every department's
# kit (chef belts, medical HUDs, mime masks); these curate the engineering-appropriate subset
# from the same loadout prototypes, plus a few plant-specific additions defined below.

# --- New loadout prototypes ---------------------------------------------------

- type: loadout
  id: PlantManagerMessengerBag
  equipment:
    back: ClothingBackpackMessengerChiefEngineer

- type: loadout
  id: PlantHardhatBlue
  equipment:
    head: ClothingHeadHatHardhatBlue

- type: loadout
  id: PlantEngineeringBeret
  equipment:
    head: ClothingHeadHatBeretEngineering

- type: loadout
  id: PlantScarfStripedOrange
  equipment:
    neck: ClothingNeckScarfStripedOrange

- type: loadout
  id: PlantGasAnalyzer
  inhand:
    - GasAnalyzer

- type: loadout
  id: PlantWelder
  inhand:
    - Welder

- type: loadout
  id: PlantHolofanProjector
  effects:
  - !type:GroupLoadoutEffect
    proto: ContractorT1
  price: 750
  inhand:
    - HolofanProjector

# Cargo sells the RPD/RCD crates at 800; personal spawns are priced at or above that
# so the loadout is a convenience, not an arbitrage. RCD is T2-gated: it deconstructs
# walls and floors, so it stays behind the same 30-hour gate as the other T2 kit.
- type: loadout
  id: PlantRPD
  effects:
  - !type:GroupLoadoutEffect
    proto: ContractorT1
  price: 800
  inhand:
    - RPD

- type: loadout
  id: PlantRCD
  effects:
  - !type:GroupLoadoutEffect
    proto: ContractorT2
  price: 1200
  inhand:
    - RCD

- type: loadout
  id: PlantRCDAmmo
  effects:
  - !type:GroupLoadoutEffect
    proto: ContractorT2
  price: 400
  inhand:
    - RCDAmmo

