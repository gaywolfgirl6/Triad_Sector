- type: pointOfInterest
  id: Edison
  parent: [BasePOI, BaseRepairablePOI]
  name: 'Edison Power Plant'
  minimumDistance: 5650
  maximumDistance: 7400
  spawnGroup: Required
  gridPath: /Maps/_NF/POI/edison.yml
  addComponents:
  - type: IFF
    color: "#3737F8"
  - type: SolarPoweredGrid
    trackOnInit: true
    doNotCull: true

- type: gameMap
  id: Edison
  mapName: 'Edison Power Plant'
  mapPath: /Maps/_NF/POI/edison.yml
  minPlayers: 0
  stations:
    Edison:
      stationProto: RecordsFrontierOutpostCargo # Triad: Cargo variant carries StationCargoOrderDatabase; without it the Director of Infrastructure's request computer can't take orders
      components:
        - type: StationNameSetup
          mapNameTemplate: 'Edison Power Plant'
        # Triad: join-menu card (icon, subtext, description); mirrors medical.yml's setup
        - type: ExtraStationInformation
          icon:
            sprite: Structures/Decoration/banner.rsi
            state: banner_engineering
          stationSubtext: 'triad-lobby-edison-subtext'
          stationDescription: 'triad-lobby-edison-description'
          lobbySortOrder: 5
        # Triad: staff the plant with its own roles; Pilot/Mercenary let regular folks join here
        - type: StationJobs
          availableJobs:
            PlantManager: [ 1, 1 ]
            PlantTechnician: [ 3, 3 ]
            Pilot: [ -1, -1 ]
            Mercenary: [ -1, -1 ]
            Contractor: [ -1, -1 ]
