  description: What was supposed to be "Suppermatter" led to a horrible misunderstanding and a class-action lawsuit.
  components:
  - type: Sprite
    sprite: _CS/Objects/Consumable/Food/Baked/donkpocket.rsi
    state: supermatter-box
  - type: StorageFill
    contents:
    - id: FoodDonkpocket
      amount: 6

# Printable to-go box

# --- CSComputerCargoOrdersEddison  (coyote: _CS/Entities/Structures/Machines/Computers/computers.yml) ---
- type: entity
  id: CSComputerCargoOrdersEddison
  parent: ComputerCargoOrders
  name: Director of Infrastructure's request computer
  description: Used to purchase restricted engineering supplies.
  components:
  # Triad: dropped the NFCargoOrderConsole override (NF sector-cargo variant not ported) and
  # the coyote Sprite override (screen state 'request-eng' absent from our computers.rsi);
  # inherits the stock cargo console + screen from parent ComputerCargoOrders.
  # Triad: keep the parent's sector tax split but route a cut to the plant's own account.
  - type: CargoOrderConsole
    taxAccounts:
      Frontier: 0.25
      TDF: 0.15
      Medical: 0.1
      Edison: 0.15
  - type: AccessReader
    access: [["Command"]] # Triad: retired ChiefEngineer; the Director runs the plant on Command

# --- EdisonTechFab  (coyote: _CS/Entities/Structures/Machines/lathe.yml) ---
- type: entity
  # Triad: reparented to stock Autolathe. Coyote's NFBlueprintReceiver base, 20 custom recipe
  # packs, and EdisonTechFabCircuitboard were not ported (disproportionate for a POI techfab);
  # keeps the Edison techfab sprite and uses stock autolathe recipes/board. Lathe idle/running
  # states point at the techfab.rsi 'icon' state so the visualizer resolves.
  parent: Autolathe
  id: EdisonTechFab
  name: edison engineering techfab
  description: Prints equipment for Edison engineers.
  components:
  - type: Sprite
    sprite: _CS/Structures/Machines/techfab.rsi
    snapCardinals: true
    layers:
    - state: icon
      map: ["enum.LatheVisualLayers.IsRunning"]
    - state: edison
    - state: unlit
      shader: unshaded
      map: ["enum.PowerDeviceVisualLayers.Powered"]
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
    - state: panel
      map: ["enum.WiresVisualLayers.MaintenancePanel"]
  - type: Lathe
    idleState: icon
    runningState: icon

