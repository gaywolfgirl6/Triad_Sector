#
# Triad: Edison POI content dependencies. Entity prototypes the Coyote Edison map
# places that this fork lacked, ported from ARF-SS13/coyote-frontier @ 2f30035e (which
# aggregates content from _CS/coyote, _NF/Frontier, _HL/Hardlight, and standard layers).
# Parent chains closed against this fork's existing protos; the 3 power machines
# (AntiMatterFabricator, EnergyAirConverter, PowerTransmissionPoint) are backed by the
# _NF Manufacturing / PowerTransmission C# systems ported alongside this. The Floof leash
# was dropped (substituted in the map) rather than port the Leash subsystem.

# --- FoodBoxDonkpocketSupermatter  (coyote: _CS/Entities/Objects/Consumables/Food/Containers/box.yml) ---
