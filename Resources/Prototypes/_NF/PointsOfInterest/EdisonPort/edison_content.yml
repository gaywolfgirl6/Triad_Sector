# --- AntiMatterFabricator  (coyote: _NF/Entities/Structures/Machines/ame_fab.yml) ---
- type: entity
  parent: [ BaseStructureDisableToolUse, BaseStructureIndestructible, BaseMachine ]
  id: AntiMatterFabricator
  name: anti-matter fabricator
  description: A colossal machine that converts plasteel and power into antimatter and stores it in AME fuel jars in a slot.
  placement:
    mode: SnapgridCenter
  components:
  - type: Anchorable
    flags: None
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.45,-1.45,1.45,1.45"
        density: 500
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: HVPower
        enabled: false
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _NF/Structures/Machines/AMEFab/32x32.rsi # needed for item mapper
    layers:
    - sprite: _NF/Structures/Machines/AMEFab/base.rsi
      state: base
    - state: dial
      offset: -0.5, 0.5
      map: [ dial ]
    - sprite: _NF/Structures/Machines/AMEFab/64x32.rsi
      state: flywheel
      offset: 0.5, 0.5
      map: [ flywheel ]
    - sprite: _NF/Structures/Machines/AMEFab/64x32.rsi
      state: press
      offset: -0.5, 0
      map: [ press ]
    - state: slot-full
      offset: 1, 0
      map: [ slot-full ]
      visible: false
    - state: slot-unlit
      map: [ slot-unlit ]
      shader: unshaded
      visible: false
    - state: material-good
      map: [ material ]
      shader: unshaded
      visible: false
    - state: panel-unlit
      offset: 1, -1
      map: [ panel ]
      shader: unshaded
      visible: false
    - state: inserting
      map: ["enum.MaterialStorageVisualLayers.Inserting"]
      offset: 1, -0.5
      visible: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        dial:
          True: { state: dial-animated }
          False: { state: dial }
        flywheel:
          True: { state: flywheel-animated }
          False: { state: flywheel }
        press:
          True: { state: press-animated }
          False: { state: press }
        panel:
          True: { visible: true }
          False: { visible: false }
        material:
          True: { visible: true }
          False: { visible: false }
      enum.EntitySpawnMaterialVisuals.SufficientMaterial:
        material:
          True: { state: material-good }
          False: { state: material-low }
  - type: ItemMapper
    containerWhitelist:
    - output
    mapLayers:
      slot-full:
        whitelist:
          components:
          - NFFuel
      slot-unlit:
        whitelist:
          components:
          - NFFuel
  - type: PowerConsumer
    drawRate: 100000
  - type: PowerMonitoringDevice
    group: Consumer
    loadNode: input
    collectionName: transmissionpoint
    sprite: _NF/Structures/Power/TransmissionPoint/32x32.rsi
    state: icon
  - type: WiredNetworkConnection
  - type: UserInterface
    interfaces:
      enum.AdjustablePowerDrawUiKey.Key:
        type: AdjustablePowerDrawBoundUserInterface
  - type: ActivatableUI
    key: enum.AdjustablePowerDrawUiKey.Key
  - type: EntitySpawnPowerConsumer
    spawn: AmeJar
    energyPerSpawn: 6000000000 # 1.2 GJ (75% base eff.) multiplied by 5 to compensate for AmeJarBig buff
    material: Plasteel
    materialAmount: 500
  - type: ItemSlots
    slots:
      output:
        swap: false
        insertOnInteract: false
        ejectOnInteract: true
        whitelist:
          components:
          - NFFuel
  - type: ContainerContainer
    containers:
      output: !type:ContainerSlot {}
  - type: MaterialStorage
    materialWhiteList:
    - Plasteel
    storageLimit: 15000

# --- EnergyAirConverter  (coyote: _NF/Entities/Structures/Piping/Atmospherics/unary.yml) ---
- type: entity
  parent: [ BaseStructureDisableToolUse, BaseStructureIndestructible, BaseMachine ]
  id: EnergyAirConverter
  name: energy-to-plasma converter
  description: An enormous machine that converts huge amounts of power into superheated plasma.
  placement:
    mode: SnapgridCenter
  components:
  - type: Anchorable
    flags: None
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.45,-1.45,1.45,1.45"
        density: 500
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: HVPower
        enabled: false
      port:
        !type:PortablePipeNode
        nodeGroupID: Pipe
        rotationsEnabled: false
        volume: 1
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    sprite: _NF/Structures/Machines/GasConverter/32x32.rsi
    layers:
    - sprite: _NF/Structures/Machines/GasConverter/base.rsi
      state: base
    - state: fan
      map: [fan]
      offset: -0.6875, 1 # 11/16, -22 px offset
    - state: front-panel-unlit
      shader: unshaded
      map: [front-panel]
      offset: 0, -1
    - state: gas
      color: "#FFFFFF01"
      map: [gas]
      offset: 1, 0.5
    - state: window-unlit
      shader: unshaded
      map: [window]
      offset: 0, 0.25
    - state: panel-unlit
      shader: unshaded
      map: [panel]
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        fan:
          True: { state: fan-animated }
          False: { state: fan }
        front-panel:
          True: { visible: true }
          False: { visible: false }
        panel:
          True: { visible: true }
          False: { visible: false }
        window:
          True: { visible: true }
          False: { visible: false }
      enum.GasCanisterVisuals.PressureState:
        gas:
          0: { color: "#FFFFFF01" }
          1: { color: "#FFFFFF22" }
          2: { color: "#FFFFFF44" }
          3: { color: "#FFFFFF66" }
  - type: PowerConsumer
    drawRate: 100000
  - type: PowerMonitoringDevice
    group: Consumer
    loadNode: input
    collectionName: transmissionpoint
    sprite: _NF/Structures/Power/TransmissionPoint/32x32.rsi
    state: icon # FIXME: no icon, machine doesn't appear on the power monitor
  - type: WiredNetworkConnection
  - type: UserInterface
    interfaces:
      enum.AdjustablePowerDrawUiKey.Key:
        type: AdjustablePowerDrawBoundUserInterface
  - type: ActivatableUI
    key: enum.AdjustablePowerDrawUiKey.Key
  - type: GasSpawnPowerConsumer
    spawnMixture:
      moles:
      - 0 # oxygen
      - 0 # nitrogen
      - 0 # CO2
      - 1 # Plasma
      - 0 # Tritium
      - 0 # Water vapor
      - 0 # Ammonia
      - 0 # N2O
      - 0 # Frezon
      temperature: 5273
  - type: GasCanister
    gasMixture:
      volume: 10000 # big tank to store backup
    gasTankSlot:
      locked: True # cannot be unlocked, unusable
  - type: AtmosDevice
    requireAnchored: false
    joinSystem: true
  - type: GasPortable # for the connector port
  - type: ItemSlots
  - type: ContainerContainer
    containers:
      tank_slot: !type:ContainerSlot {}

# --- PowerTransmissionPoint  (coyote: _NF/Entities/Structures/Power/transmission_point.yml) ---
- type: entity
  id: PowerTransmissionPoint
  parent: [ BaseStructureDisableToolUse, BaseStructureIndestructible, BaseMachine ]
  name: power transmission point
  description: A gargantuan machine for offsite power transmission using quantum entanglement.
  placement:
    mode: SnapgridCenter
  components:
  - type: Anchorable
    flags: None
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-1.45,-1.45,1.45,1.45"
        density: 500
        mask:
        - LargeMobMask
        layer:
        - WallLayer
  - type: AmbientSound
    volume: -3
    range: 6
    sound:
      path: /Audio/_NF/Ambience/power-hum.ogg
    enabled: false
  - type: Sprite
    sprite: _NF/Structures/Power/TransmissionPoint/base.rsi
    offset: 0,1
    snapCardinals: false
    noRot: true
    drawdepth: Mobs
    layers:
      - state: base
      - sprite: _NF/Structures/Power/TransmissionPoint/96x32.rsi
        state: base-unlit
        shader: unshaded
        map: ["unlit"]
        visible: false
        offset: 0, 2
      - sprite: _NF/Structures/Power/TransmissionPoint/96x32.rsi
        state: base-foreground
        offset: 0, 2
      - sprite: _NF/Structures/Power/TransmissionPoint/32x32.rsi
        state: panel-unlit
        map: ["panel"]
        visible: false
        offset: 0, -2
  - type: SpriteFade
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      enum.PowerDeviceVisuals.Powered:
        unlit:
          True: { visible: true }
          False: { visible: false }
        panel:
          True: { visible: true }
          False: { visible: false }
  - type: PowerTransmission
    account: Edison # Triad: restored coyote's Edison sector account
  - type: PowerConsumer
    drawRate: 100000
  - type: ExaminableBattery
  - type: NodeContainer
    examinable: true
    nodes:
      input:
        !type:CableDeviceNode
        nodeGroupID: HVPower
        enabled: false
  - type: PowerMonitoringDevice
    group: Consumer
    loadNode: input
    collectionName: transmissionpoint
    sprite: _NF/Structures/Power/TransmissionPoint/32x32.rsi
    state: icon
  - type: Electrified
    onHandInteract: false
    onInteractUsing: false
    onBump: false
    requirePower: true
    highVoltageNode: input
  - type: WiredNetworkConnection
  - type: GuideHelp
    guides:
    - VoltageNetworks
    - Power
  - type: UserInterface
    interfaces:
      enum.AdjustablePowerDrawUiKey.Key:
        type: AdjustablePowerDrawBoundUserInterface
  - type: ActivatableUI
    key: enum.AdjustablePowerDrawUiKey.Key
  - type: PointLight
    color: "#00ccff"
    energy: 4
    radius: 7
    enabled: false

