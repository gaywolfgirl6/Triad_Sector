# --- Furniture -----------------------------------------------------------------
- type: entity
  id: BaseSinkUnfinished
  parent: BaseStructureDynamic
  abstract: true
  name: unfinished sink
  description: A sink under construction
  components:
  - type: Physics
    bodyType: Dynamic
    canCollide: false
  - type: InteractionOutline
  - type: Sprite
    sprite: Structures/Furniture/sink.rsi
    state: sink_stem
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 80
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
      - trigger:
          !type:DamageTrigger
          damage: 40
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak

# Triad: dropped upstream Construction (graph `FloorDrain` absent). Static drain sprite.
- type: entity
  id: FloorDrainUnfinished
  parent: BaseSinkUnfinished
  name: unfinished drain
  description: A drain under construction
  components:
    - type: Sprite
      drawdepth: FloorObjects
      sprite: Objects/Specific/Janitorial/drain.rsi
      state: icon
    - type: Destructible
      thresholds:
        - trigger:
            !type:DamageTrigger
            damage: 200
          behaviors:
            - !type:DoActsBehavior
              acts: [ "Destruction" ]

# --- Doors ---------------------------------------------------------------------
- type: entity
  parent: AirlockAtmospherics
  id: AirlockAtmosphericsEngineeringLocked
  suffix: Engineering, Locked
  components:
  - type: ContainerFill
    containers:
      board: [ DoorElectronicsEngineering ]

# --- Power ---------------------------------------------------------------------
# Triad: dropped upstream `_NF/Structures/Power/bles.rsi` sprite (not vendored) and its
# Smes overlay-prefix override; inherits the standard SMES sprite. Big-capacity BLES retained.
- type: entity
  id: SMESBig
  parent: [BaseStructureDisableToolUse, BaseStructureIndestructible, BaseSMES]
  suffix: 100kWh
  name: BLES
  description: A bluespace-leveraged energy storage (BLES) unit.
  components:
  - type: UpgradeBattery
    maxChargeMultiplier: 1 # non-upgradeable
    baseMaxCharge: 360000000
  - type: BatteryInterface
    minChargeRate: 50000
    maxChargeRate: 1500000
    minSupply: 50000
    maxSupply: 1500000
  - type: Battery
    maxCharge: 360000000
  - type: PowerNetworkBattery
    maxSupply: 1500000
    maxChargeRate: 50000
    supplyRampTolerance: 50000
    supplyRampRate: 10000

# Triad: ChemistryBottleSugar dropped as duplicate of base Entities/Objects/Specific/chemistry-bottles.yml

# --- Crates --------------------------------------------------------------------
# Triad: reparented from `CrateEngineeringSecureEngineering` (absent) to CrateEngineeringSecure
# and dropped the `BindFillToStation` component (absent). Contents unchanged.
- type: entity
  id: CrateEngineeringTeslaCoilBulk
  parent: CrateEngineeringSecure
  name: bulk tesla coil crate
  description: A collection of six tesla coils. Attracts lightning and generates energy from it.
  components:
  - type: StorageFill
    contents:
      - id: TeslaCoilFlatpack
        amount: 6

- type: entity
  id: CrateEngineeringSingularityCollectorBulk
  parent: CrateEngineeringSecure
  name: bulk radiation collector crate
  description: A collection of six radiation collectors, best used for singularity engines. Plasma is included.
  components:
  - type: StorageFill
    contents:
      - id: RadiationCollectorFlatpack
        amount: 6
      - id: PlasmaTankFilled
        amount: 6

- type: entity
  id: CrateEngineeringTeslaGroundingRodBulk
  parent: CrateEngineeringSecure
  name: bulk tesla grounding rod crate
  description: A collection of four grounding rods, best for lightning protection.
  components:
  - type: StorageFill
    contents:
      - id: TeslaGroundingRodFlatpack
        amount: 4
