- type: entity
  save: false
  name: Urist McShadow
  parent: [BaseMobSpeciesOrganic]
  id: BaseMobShadekin
  abstract: true
  components:
    - type: LanguageKnowledge
      speaks:
        - TauCetiBasic
      understands:
        - TauCetiBasic
    - type: Inventory
      speciesId: shadekin
    - type: Hunger
    - type: Thirst
    - type: HumanoidAppearance
      species: Shadekin
    - type: Icon
      sprite: _Starlight/Mobs/Species/Shadekin/parts.rsi
      state: full
    - type: Body
      prototype: Shadekin
      requiredLegs: 2
    - type: Speech
      allowedEmotes: ["Marr", "Wurble", "Hiss", "Growl", "Purr"]
    - type: Vocal
      sounds:
        Male: MaleShadekin
        Female: FemaleShadekin
        Unsexed: MaleShadekin
    - type: MeleeWeapon
      soundHit:
        collection: AlienClaw
      angle: 30
      animation: WeaponArcClaw
      damage:
        types:
          Slash: 5
    - type: FlashModifier
      modifier: 2
    - type: Damageable
      damageContainer: Biological
      damageModifierSet: Shadekin
    - type: Reactive
      groups:
        Flammable: [Touch]
        Extinguish: [Touch]
        Acidic: [ Touch, Ingestion ]
      reactions:
        - reagents: [Water, SpaceCleaner]
          methods: [Touch]
          effects:
            - !type:WashCreamPieReaction
            - !type:Emote
              emote: Hiss
              showInChat: false
    - type: Bloodstream
      bloodReagent: DarkBlood
      bloodMaxVolume: 300
      bloodlossDamage:
        types:
          Bloodloss: 1
      bloodlossHealDamage:
        types:
          Bloodloss: -0.25
    - type: TypingIndicator
      proto: alien
    - type: PassiveDamage
      allowedStates:
        - Alive
      damageCap: 20
      damage:
        groups:
          Brute: -0.07
          Burn: -0.07
    - type: Destructible
      thresholds:
        - trigger: !type:DamageTypeTrigger
            damageType: Blunt
            damage: 400
          behaviors:
            - !type:GibBehavior {}
        - trigger: !type:DamageTypeTrigger
            damageType: Heat
            damage: 1500
          behaviors:
            - !type:SpawnEntitiesBehavior
              spawnInContainer: true
              spawn:
                Ash:
                  min: 1
                  max: 1
            - !type:BurnBodyBehavior {}
    # BaseMobSpeciesOrganic overrides
    - type: Barotrauma
      damage:
        types:
          Blunt: 0.85 #per second, scales with pressure and other constants.
          Heat: 0.1
