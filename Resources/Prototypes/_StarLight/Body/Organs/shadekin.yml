- type: entity
  id: OrganShadekinBrain
  parent: OrganHumanBrain
  description: "The source of incredible, unending intelligence. Marr."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Shadekin/organs.rsi
    state: brain

# Triad edit start - Add lungs to shadekin
- type: entity
  id: OrganShadekinLungs
  parent: OrganHumanLungs
  name: lungs
# Triad edit end

- type: entity
  id: OrganShadekinEyes
  parent: OrganHumanEyes
  suffix: Shadekin
  description: "Eyes of a shadekin.. very bright."
  components:
  - type: Sprite
    sprite: _Starlight/Mobs/Species/Shadekin/organs.rsi
    layers:
      - state: eyes
  - type: Organ
    onAdd:
    - type: NightVision # Gen Scifi Exodimensional Cat Alien BS vision
      relayOverlay: false
      goggleEffect: true
      viewCircleRadius: 1080
      viewCircleCount: 1
      action: ActionToggleNightVision
      phosphorColor: "#93B8D4" #Blue-grey
      lightingColor: "#585813" #Brighter spots appear darker.
      blacklistedComponents:
        components:
        - FlashImmunity
      blacklistFailPopup: night-vision-component-cannot-use-flash
      activateSound: null
      deactivateSound: null

